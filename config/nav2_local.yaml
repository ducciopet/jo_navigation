bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20


bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True


bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True


controller_server:
  ros__parameters:
    odom_topic: /odometry/filtered
    controller_frequency: 25.0
    transform_tolerance: 0.3

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.45
      stateful: True

    FollowPath:
      plugin: nav2_graceful_controller::GracefulController

      min_lookahead: 0.8
      max_lookahead: 2.6

      # Riattivato per favorire: ruota prima -> vai avanti,
      # invece di usare subito la retromarcia.
      initial_rotation: true
      initial_rotation_threshold: 0.55

      # Evita spin finali aggressivi per raggiungere yaw esatto.
      prefer_final_rotation: false

      # Mantiene retromarcia disponibile, ma viene limitata dal velocity_smoother.
      allow_backward: true

      k_phi: 2.0
      k_delta: 1.0
      beta: 0.4
      lambda: 2.0

      v_linear_min: 0.05
      v_linear_max: 0.65

      v_angular_max: 1.1
      v_angular_min_in_place: 0.10

      slowdown_radius: 1.4

      footprint_scaling_linear_vel: 0.3
      footprint_scaling_factor: 0.35
      footprint_scaling_step: 0.05

      obstacle_cost_margin: 10
      final_rotation_search_step: 0.2


local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 20.0
      publish_frequency: 6.0

      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True

      rolling_window: true
      width: 20
      height: 20
      resolution: 0.05

      transform_tolerance: 2.0
      buffer_duration: 60.0

      robot_radius: 0.52

      plugins: ["voxel_layer", "dynamic_obstacle_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False

        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0

        observation_sources: scan

        scan:
          topic: /velodyne_points_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0

      dynamic_obstacle_layer:
        plugin: "jo_sim::DynamicObstacleLayer"
        enabled: True

        obstacle_padding: 0.15
        tracking_timeout: 1.0

        # Zona frontale molto lunga nella direzione della velocità.
        velocity_inflation_k: 7.0
        velocity_inflation_min: 0.05

        # Dietro quasi libero, così il robot preferisce passare dalla parte posteriore.
        rear_inflation_k: 0.05

        # Allargamento laterale maggiore per evitare tagli troppo vicini.
        lateral_inflation_k: 1.15

        # Costi alti nella zona dinamica frontale.
        dynamic_risk_cost: 252
        dynamic_risk_min_cost: 120

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 1.2

      always_send_full_costmap: False


global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 8.0
      publish_frequency: 2.0

      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True

      transform_tolerance: 1.0
      buffer_duration: 60.0

      robot_radius: 0.52
      resolution: 0.05

      track_unknown_space: true
      rolling_window: true
      width: 40
      height: 40

      plugins: ["obstacle_layer", "dynamic_obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True

        observation_sources: scan

        scan:
          topic: /velodyne_points_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0

      dynamic_obstacle_layer:
        plugin: "jo_sim::DynamicObstacleLayer"
        enabled: True

        obstacle_padding: 0.15
        tracking_timeout: 1.0

        # Più aggressivo nella global costmap, così il planner evita il fronte.
        velocity_inflation_k: 7.5
        velocity_inflation_min: 0.05

        # Dietro quasi libero.
        rear_inflation_k: 0.02

        # Penalizzazione laterale alta per evitare traiettorie tangenti.
        lateral_inflation_k: 1.20

        dynamic_risk_cost: 252
        dynamic_risk_min_cost: 140

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 1.2

      always_send_full_costmap: False


map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""


map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True


planner_server:
  ros__parameters:
    expected_planner_frequency: 8.0
    allow_partial_planning: True
    planner_patience: 15.0
    use_sim_time: True

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.1
      use_astar: true
      allow_unknown: true


smoother_server:
  ros__parameters:
    use_sim_time: True

    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True


behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint

    cycle_frequency: 20.0

    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.1
    use_sim_time: True

    simulate_ahead_time: 3.0

    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 2.0


robot_state_publisher:
  ros__parameters:
    use_sim_time: True


waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false

    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


velocity_smoother:
  ros__parameters:
    use_sim_time: True

    smoothing_frequency: 25.0
    scale_velocities: False
    feedback: "OPEN_LOOP"

    # Moto frontale normale.
    max_velocity: [0.65, 0.0, 1.1]

    # Retromarcia mantenuta solo come emergenza.
    min_velocity: [-0.06, 0.0, -1.0]

    max_accel: [1.5, 0.0, 2.4]
    max_decel: [-1.8, 0.0, -2.8]

    odom_topic: /odometry/filtered
    odom_duration: 0.1

    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


lidar_dynamic_filter:
  ros__parameters:
    use_sim_time: True
    tracking_timeout: 1.0
    obstacle_padding: 0.15